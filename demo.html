<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICP JS Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{color:#e94560;margin-bottom:16px;font-size:22px;flex-shrink:0}
.main{display:flex;flex-direction:column;gap:16px;flex-shrink:0;width:100%;max-width:1000px}
.input-row{display:flex;gap:12px;width:100%}
#cmdInput{flex:1;padding:16px 20px;background:#0f3460;color:#e0e0e0;border:1px solid #1a1a5e;border-radius:10px;font-size:16px;outline:none;min-height:56px;max-height:200px;resize:vertical;overflow-y:auto;line-height:1.5;font-family:inherit}
#cmdInput:focus{border-color:#e94560}
button{padding:12px 24px;background:#e94560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;white-space:nowrap}
button:hover{background:#c23850}
button:disabled{opacity:0.5;cursor:not-allowed}
#aicp-output{width:900px;height:600px;min-width:500px;min-height:300px;background:#0f3460;border-radius:8px;overflow:hidden;resize:both;position:relative;margin-top:16px}
#aicp-output::after{content:'';position:absolute;bottom:0;right:0;width:24px;height:24px;background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.2) 50%);cursor:nwse-resize;border-radius:0 0 8px 0;pointer-events:none}
.status-text{font-size:12px;color:#a0a0a0;text-align:center;padding:4px 0;flex-shrink:0}
</style>
</head>
<body>
<h1>🧠 AICP JS Engine</h1>
<div class="main">
    <div class="input-row">
        <textarea id="cmdInput" placeholder="Speak your command..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();run()}"></textarea>
        <button id="runBtn" onclick="run()">Do it</button>
        <button id="saveBtn" onclick="saveHTML()" style="background:#1a1a5e;">💾 Save</button>
        <button id="settingsBtn" onclick="showSettings()" style="background:#1a1a5e;">⚙️</button>
    </div>
</div>
<div id="aicp-output"></div>
<div id="status" class="status-text">引擎就绪 | 拖拽右下角自由调整容器大小 | Shift+Enter 换行</div>

<script type="module">
    import aicp, { Config } from '/aicp-core/aicp-core.js';
    
    const runBtn = document.getElementById('runBtn');
    const cmdInput = document.getElementById('cmdInput');
    const output = document.getElementById('aicp-output');
    const statusEl = document.getElementById('status');
    
    window.run = async function() {
        const q = cmdInput.value.trim();
        if (!q) return;
        runBtn.disabled = true;
        statusEl.textContent = '⏳ 处理中...';
        
        const rect = output.getBoundingClientRect();
        
        try {
            const result = await aicp.send('runner/exec', {
                messages: [{ role: 'user', content: q }],
                maxIter: aicp.agent.get('maxIter', 5),
                container: output,
                width: Math.floor(rect.width) - 4,
                height: Math.floor(rect.height) - 4,
                onStart: () => {},
                onDone: (data) => {
                    statusEl.textContent = '✅ 完成 | 拖拽右下角自由调整容器大小';
                },
                onError: (err) => {
                    statusEl.textContent = '❌ ' + err;
                    output.innerHTML = `<div style="color:#e94560;padding:20px;">❌ ${err}</div>`;
                },
            });
        } catch (e) {
            statusEl.textContent = '❌ ' + e.message;
            output.innerHTML = `<div style="color:#e94560;padding:20px;">❌ ${e.message}</div>`;
        }
        runBtn.disabled = false;
        cmdInput.focus();
    };

    window.showSettings = function() {
    const config = aicp.config || {};
    const apiKey = prompt('API Key:', config.apiKey || '');
    if (apiKey === null) return;
    const baseUrl = prompt('Base URL:', config.baseUrl || 'https://gpt-agent.cc/v1');
    if (baseUrl === null) return;
    const model = prompt('Model:', config.model || 'doubao-seed-2.0-code');
    if (model === null) return;
    const maxIter = prompt('Max Retries:', config.maxIter || 5);
    if (maxIter === null) return;
    const temperature = prompt('Temperature (0-1):', config.temperature || 0.1);
    if (temperature === null) return;

    const newConfig = { 
        apiKey, baseUrl, model, 
        maxIter: parseInt(maxIter), 
        temperature: parseFloat(temperature) 
    };
    Object.assign(aicp.config, newConfig);
    aicp.agent.set('apiKey', apiKey);
    aicp.agent.set('baseUrl', baseUrl);
    aicp.agent.set('model', model);
    aicp.agent.set('maxIter', parseInt(maxIter));
    aicp.agent.set('temperature', parseFloat(temperature));
    
    // 不管有没有 Config，都写 localStorage
    try {
        Config.save(newConfig);
    } catch(e) {
        localStorage.setItem('aicp_config', JSON.stringify(newConfig));
    }
    
    statusEl.textContent = '✅ Config updated';
};

   window.saveHTML = async function() {
    if (!output.children.length) {
        alert('No content to save');
        return;
    }
    
    const code = output.getAttribute('data-aicp-code') || '';
    const escapedCode = code
        .replace(/\\/g, '\\\\')
        .replace(/`/g, '\\`')
        .replace(/\$/g, '\\$');
    
    const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICP Generated</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;padding:8px}
#aicp-container{position:relative;width:100%;min-height:calc(100vh - 16px)}
#aicp-container > *{position:relative;z-index:1}
#aicp-container > canvas{position:absolute;top:0;left:0;z-index:0}
.config-btn{position:fixed;top:10px;right:10px;z-index:9999;padding:6px 12px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.config-btn:hover{background:#2563eb}
</style>
</head>
<body>
<div id="aicp-container"></div>
<button class="config-btn" onclick="showLLMConfig()">⚙️ LLM配置</button>
<script>
const aicpCode=\`${escapedCode}\`;

function getLLMConfig() {
    return {
        apiKey: localStorage.getItem('aicp_api_key') || '',
        baseUrl: localStorage.getItem('aicp_base_url') || 'https://gpt-agent.cc/v1',
        model: localStorage.getItem('aicp_model') || 'doubao-seed-2.0-code',
        temperature: parseFloat(localStorage.getItem('aicp_temperature')) || 0.1,
    };
}

function saveLLMConfig(config) {
    localStorage.setItem('aicp_api_key', config.apiKey);
    localStorage.setItem('aicp_base_url', config.baseUrl);
    localStorage.setItem('aicp_model', config.model);
    localStorage.setItem('aicp_temperature', String(config.temperature));
}

window.showLLMConfig = function() {
    const cfg = getLLMConfig();
    const apiKey = prompt('API Key:', cfg.apiKey);
    if (apiKey === null) return;
    const baseUrl = prompt('Base URL:', cfg.baseUrl);
    if (baseUrl === null) return;
    const model = prompt('Model:', cfg.model);
    if (model === null) return;
    const temperature = parseFloat(prompt('Temperature (0-1):', String(cfg.temperature)));
    if (isNaN(temperature)) return;
    
    saveLLMConfig({ apiKey, baseUrl, model, temperature });
    alert('配置已更新，即将刷新页面');
    location.reload();
};

document.addEventListener('DOMContentLoaded', function() {
    const needLLM = aicpCode.includes('llm(') || aicpCode.includes('llm ');
    let llm = null;
    if (needLLM) {
        const cfg = getLLMConfig();
        if (!cfg.apiKey) {
            window.showLLMConfig();
            cfg.apiKey = localStorage.getItem('aicp_api_key') || '';
        }
        if (cfg.apiKey) {
            let llmCallCount = 0;
            llm = async (msgs) => {
                if (llmCallCount >= 9999) throw new Error('LLM 调用次数超限');
                llmCallCount++;
                const resp = await fetch(cfg.baseUrl + '/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
                    body: JSON.stringify({ model: cfg.model, messages: msgs, temperature: cfg.temperature })
                });
                const data = await resp.json();
                return data.choices?.[0]?.message?.content || data.content || '';
            };
        }
    }

    if(aicpCode&&aicpCode.trim()){try{const c=document.getElementById('aicp-container');const fn=new Function('__aicp_container__','__aicp_width__','__aicp_height__','llm','document','Math','Date','JSON','setTimeout','clearTimeout','setInterval','clearInterval','requestAnimationFrame','cancelAnimationFrame',aicpCode);fn(c,c.clientWidth||window.innerWidth-16,c.clientHeight||window.innerHeight-16,llm,document,Math,Date,JSON,setTimeout,clearTimeout,setInterval,clearInterval,requestAnimationFrame,cancelAnimationFrame)}catch(e){console.error(e)}}
});
<\/script>
</body>
</html>`;
    
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `aicp-generated-${Date.now()}.html`;
    a.click();
    URL.revokeObjectURL(url);
    statusEl.textContent = '✅ Saved as standalone HTML';
};
</script>
</body>
</html>
